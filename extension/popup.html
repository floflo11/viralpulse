<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 300px; font-family: -apple-system, system-ui, sans-serif; background: #fafaf9; color: #1c1917; padding: 16px; }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
    h1 span { color: #dc2626; }
    .info { font-size: 13px; color: #57534e; line-height: 1.5; margin-bottom: 12px; }
    .info strong { color: #1c1917; }
    .divider { border-top: 1px solid #e7e5e4; margin: 12px 0; }
    .saved-info { font-size: 12px; color: #78716c; display: flex; justify-content: space-between; align-items: center; }
    .saved-info a { color: #2563eb; text-decoration: none; font-weight: 500; }
    .saved-info a:hover { text-decoration: underline; }
    .settings { margin-top: 12px; padding-top: 12px; border-top: 1px solid #e7e5e4; }
    .settings label { font-size: 11px; color: #78716c; display: block; margin-bottom: 4px; }
    .settings input { width: 100%; border: 1px solid #e7e5e4; border-radius: 6px; padding: 6px 8px; font-size: 12px; font-family: monospace; }
    .settings input:focus { outline: none; border-color: #dc2626; }
    .status { font-size: 12px; margin-top: 6px; text-align: center; }
    .inject-btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; background: #1c1917; color: #fff; margin-bottom: 8px; }
    .inject-btn:hover { background: #292524; }
  </style>
</head>
<body>
  <h1><span>Free</span>dom</h1>
  <div class="info">
    Look for the <strong>Save</strong> button next to each post's like/share buttons on X, Reddit, LinkedIn, YouTube, TikTok, Instagram, and Moltbook.
  </div>
  <button class="inject-btn" id="injectBtn">Activate Save buttons on this page</button>
  <div class="divider"></div>
  <div class="saved-info">
    <span id="savedCount">...</span>
    <a id="libraryLink" href="#" target="_blank">View library</a>
  </div>

  <div class="settings" id="settingsSection">
    <label>Your key (e.g. 82_iron_dove)</label>
    <input type="text" id="apiKeyInput" placeholder="42_swift_tiger">
    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
