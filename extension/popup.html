<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: -apple-system, system-ui, sans-serif; background: #fafaf9; color: #1c1917; padding: 16px; }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    h1 span { color: #dc2626; }
    .page-info { font-size: 11px; color: #a8a29e; margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    textarea { width: 100%; height: 50px; border: 1px solid #e7e5e4; border-radius: 8px; padding: 8px; font-size: 13px; resize: none; font-family: inherit; }
    textarea:focus { outline: none; border-color: #dc2626; }
    button { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
    .save-btn { background: #1c1917; color: white; }
    .save-btn:hover { background: #292524; }
    .save-btn:disabled { cursor: not-allowed; }
    .save-btn.saving { background: #78716c; }
    .save-btn.saved { background: #16a34a; }

    /* Success state */
    .success-panel { display: none; text-align: center; padding: 16px 0; }
    .success-panel.show { display: block; }
    .success-check { width: 48px; height: 48px; margin: 0 auto 12px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: popIn 0.3s ease; }
    .success-check svg { color: #16a34a; }
    .success-title { font-size: 15px; font-weight: 600; color: #1c1917; margin-bottom: 4px; }
    .success-detail { font-size: 12px; color: #78716c; }
    .success-detail .platform { font-weight: 600; color: #1c1917; text-transform: capitalize; }

    /* Progress bar */
    .progress { height: 3px; background: #e7e5e4; border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
    .progress.show { display: block; }
    .progress-bar { height: 100%; background: #1c1917; border-radius: 2px; width: 0%; transition: width 0.3s; animation: progressAnim 2s ease-in-out infinite; }
    @keyframes progressAnim { 0% { width: 5%; } 50% { width: 80%; } 100% { width: 95%; } }
    @keyframes popIn { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

    .status { font-size: 12px; margin-top: 8px; text-align: center; }
    .status.error { color: #dc2626; }
    .settings { margin-top: 12px; padding-top: 12px; border-top: 1px solid #e7e5e4; }
    .settings label { font-size: 12px; color: #78716c; display: block; margin-bottom: 4px; }
    .settings input { width: 100%; border: 1px solid #e7e5e4; border-radius: 6px; padding: 6px 8px; font-size: 12px; font-family: monospace; }
    .settings input:focus { outline: none; border-color: #dc2626; }

    .saved-count { font-size: 11px; color: #a8a29e; text-align: center; margin-top: 8px; }
    .saved-count a { color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
  <div id="mainPanel">
    <h1><span>Viral</span>Pulse</h1>
    <div class="page-info" id="pageInfo">Loading...</div>
    <textarea id="note" placeholder="Add a note (optional)... e.g. 'great hook', 'study this format'"></textarea>
    <button class="save-btn" id="saveBtn">Save to Library</button>
    <div class="progress" id="progress"><div class="progress-bar"></div></div>
    <div class="status" id="status"></div>
  </div>

  <div class="success-panel" id="successPanel">
    <div class="success-check">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg>
    </div>
    <div class="success-title">Saved!</div>
    <div class="success-detail">Captured from <span class="platform" id="savedPlatform">web</span></div>
    <div class="success-detail" id="savedNote" style="margin-top:4px;font-style:italic;"></div>
  </div>

  <div class="saved-count" id="savedCount"></div>

  <div class="settings" id="settingsSection">
    <label>API Key</label>
    <input type="text" id="apiKeyInput" placeholder="vp_...">
  </div>

  <script src="popup.js"></script>
</body>
</html>
